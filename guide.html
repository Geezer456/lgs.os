<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarım Rehberi · LGS.OS</title>
    <style>
        :root {
            --primary:#ff8800; --primary-glow:rgba(255,136,0,0.6);
            --bg:#050505; --card:#111; --text:#ddd;
            --header-bg:#000; --danger:#ff3333;
            --mc-green:#55ff55; --mc-green-glow:rgba(85,255,85,0.8);
            --mc-purple:#aa00ff; --mc-gold:#ffaa00; --mc-gold-glow:rgba(255,170,0,0.7);
        }
        body.theme-cyan   { --primary:#00f2ff; --primary-glow:rgba(0,242,255,0.6); }
        body.theme-purple { --primary:#bc13fe; --primary-glow:rgba(188,19,254,0.6); }
        body.theme-green  { --primary:#39ff14; --primary-glow:rgba(57,255,20,0.6); }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:.3s;}
        .top-header{width:100%;height:60px;background:var(--header-bg);border-bottom:2px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:1000;}
        .logo{color:var(--primary);font-weight:bold;font-size:20px;letter-spacing:2px;text-shadow:0 0 10px var(--primary-glow);}
        button,.nav-link{padding:6px 10px;font-size:10px;border:1px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer;font-weight:bold;transition:.3s;border-radius:12px!important;text-decoration:none;display:inline-block;line-height:normal;white-space:nowrap;}
        button:hover,.nav-link:hover{background:var(--primary);color:#000;box-shadow:0 0 8px var(--primary-glow);}
        .nav-link.achievements-link{border-color:var(--mc-green);color:var(--mc-green);box-shadow:0 0 10px var(--mc-green-glow);}
        .nav-link.achievements-link:hover{background:var(--mc-green);color:#000;}
        .guide-link-btn{border-color:var(--mc-gold)!important;color:var(--mc-gold)!important;box-shadow:0 0 10px var(--mc-gold-glow)!important;}
        .guide-link-btn:hover{background:var(--mc-gold)!important;color:#000!important;}
        .header-stats{display:flex;align-items:center;gap:12px;width:380px;}
        .lvl-box{font-weight:bold;color:var(--primary);font-size:14px;}
        .header-xp-container{flex:1;height:10px;background:#222;border-radius:5px;overflow:hidden;border:1px solid #333;}
        #header-xp-bar{height:100%;background:var(--primary);width:0%;transition:.5s;box-shadow:0 0 8px var(--primary);}
        .rank-tag{font-size:10px;background:var(--primary);color:#000;padding:2px 6px;border-radius:4px;font-weight:bold;}

        /* ── GUIDE CONTENT ── */
        .guide-hero{text-align:center;padding:40px 20px 20px;background:linear-gradient(180deg,rgba(255,136,0,.06) 0%,transparent 100%);border-bottom:1px solid #1a1a1a;}
        .guide-hero h1{font-size:32px;color:var(--primary);text-shadow:0 0 20px var(--primary-glow),0 0 40px var(--primary-glow);letter-spacing:4px;margin-bottom:8px;}
        .guide-hero p{color:#555;font-size:12px;letter-spacing:2px;}
        .progress-strip{display:flex;align-items:center;gap:16px;justify-content:center;margin-top:20px;padding:12px 24px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:12px;display:inline-flex;}
        .ps-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
        .ps-val{font-size:20px;font-weight:bold;color:var(--primary);}
        .ps-lbl{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase;}
        .ps-divider{width:1px;height:30px;background:#222;}

        .guide-toolbar{display:flex;gap:10px;padding:16px 20px;border-bottom:1px solid #111;align-items:center;flex-wrap:wrap;position:sticky;top:60px;background:var(--bg);z-index:100;}
        .search-box{flex:1;min-width:180px;padding:7px 12px;background:#000;border:1px solid #333;color:#fff;border-radius:12px;font-size:11px;outline:none;transition:.3s;}
        .search-box:focus{border-color:var(--primary);box-shadow:0 0 8px var(--primary-glow);}
        .cat-filter{display:flex;gap:6px;flex-wrap:wrap;}
        .cat-btn{padding:5px 10px;font-size:9px;border:1px solid #333;background:#000;color:#555;cursor:pointer;border-radius:10px;font-weight:bold;letter-spacing:.5px;transition:.2s;}
        .cat-btn:hover{border-color:var(--primary);color:var(--primary);}
        .cat-btn.active{background:var(--primary);color:#000;border-color:var(--primary);box-shadow:0 0 8px var(--primary-glow);}

        .guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:20px;}
        .guide-card{background:#0a0a0a;border:1.5px solid #1e1e1e;border-radius:12px;padding:14px;transition:.25s;position:relative;overflow:hidden;animation:fadeIn .3s ease both;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .guide-card:hover{border-color:var(--primary);box-shadow:0 0 12px var(--primary-glow);}
        .guide-card.unlocked{border-color:var(--mc-green);background:rgba(85,255,85,.04);}
        .guide-card.unlocked:hover{box-shadow:0 0 14px var(--mc-green-glow);}
        .guide-card.secret-card{border-color:#1a1a1a;}
        .guide-card.secret-card:hover{border-color:var(--mc-gold);}
        .guide-card.final-card.unlocked{border-color:var(--mc-purple);background:rgba(170,0,255,.05);}
        .gc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
        .gc-icon{font-size:28px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#111;border-radius:8px;border:1px solid #222;}
        .gc-icon.unlocked-icon{border-color:var(--mc-green);background:rgba(85,255,85,.07);box-shadow:0 0 8px var(--mc-green-glow);}
        .gc-meta{flex:1;}
        .gc-name{font-size:12px;font-weight:bold;color:#ccc;margin-bottom:3px;}
        .guide-card.unlocked .gc-name{color:var(--mc-green);}
        .guide-card.secret-card .gc-name{color:#555;}
        .gc-badges{display:flex;gap:4px;flex-wrap:wrap;}
        .badge{font-size:8px;padding:2px 6px;border-radius:6px;font-weight:bold;letter-spacing:.3px;}
        .b-normal{background:#1a1a1a;color:#444;border:1px solid #222;}
        .b-zor{background:rgba(255,51,51,.1);color:var(--danger);border:1px solid rgba(255,51,51,.2);}
        .b-efsa{background:rgba(255,170,0,.1);color:var(--mc-gold);border:1px solid rgba(255,170,0,.2);}
        .b-gizli{background:rgba(170,0,255,.1);color:var(--mc-purple);border:1px solid rgba(170,0,255,.2);}
        .b-sis{background:rgba(0,242,255,.1);color:#00f2ff;border:1px solid rgba(0,242,255,.2);}
        .b-final{background:rgba(170,0,255,.15);color:var(--mc-purple);border:1px solid rgba(170,0,255,.3);}
        .b-bas{background:rgba(0,255,136,.1);color:var(--mc-green);border:1px solid rgba(0,255,136,.2);}
        .b-xp{background:rgba(255,136,0,.1);color:var(--primary);border:1px solid rgba(255,136,0,.2);}
        .gc-divider{height:1px;background:#1a1a1a;margin:10px 0;}
        .gc-how{font-size:10px;color:#666;line-height:1.6;}
        .gc-how-title{font-size:8px;color:var(--primary);font-weight:bold;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
        .gc-unlock-badge{position:absolute;top:10px;right:10px;font-size:9px;padding:2px 6px;border-radius:6px;}
        .ub-open{background:rgba(85,255,85,.1);color:var(--mc-green);border:1px solid var(--mc-green);}
        .ub-lock{background:#0a0a0a;color:#2a2a2a;border:1px solid #1a1a1a;}
        .gc-dep{font-size:9px;color:#333;margin-top:6px;}
        .gc-dep span{color:#555;}

        .cat-section{padding:10px 20px 0;}
        .cat-header{display:flex;align-items:center;gap:10px;padding:6px 0;margin-bottom:2px;border-bottom:1px solid #111;}
        .cat-header h3{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;font-weight:bold;}
        .cat-count{font-size:9px;color:#222;background:#111;padding:1px 6px;border-radius:6px;}

        .footer-bar{background:#000;border-top:2px solid #1a1a1a;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#333;}
        .footer-bar span{color:var(--primary);}

        .empty-state{text-align:center;padding:60px;color:#2a2a2a;font-size:13px;}
    </style>
</head>

<script>
/* ── VERİ ── */
const STORAGE_KEY='LGS_GAMER_OS_DATA';
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return{xpTotal:0,xpBalance:0,themeIdx:0,achievements:{}};}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
let appData=loadData();
if(!appData.achievements)appData.achievements={};

const THEME=['','theme-cyan','theme-purple','theme-green'];
function applyTheme(){document.body.className=THEME[appData.themeIdx]||'';}
function cycleTheme(){appData.themeIdx=(appData.themeIdx+1)%THEME.length;saveData(appData);applyTheme();}
function updateHeader(){
    const lvl=Math.floor(appData.xpTotal/500)+1;
    document.getElementById('level').innerText=lvl;
    document.getElementById('xp-balance').innerText=appData.xpBalance;
    document.getElementById('header-xp-bar').style.width=(appData.xpTotal%100)+'%';
    const ranks=['ÇAYLAK','DENEYİMLİ','USTA','FENLİSELİ','EFSANE'];
    document.getElementById('rank-name').innerText=ranks[Math.min(lvl-1,4)];
}

/* hardcore-mode iki yerde var, kaldır */
const uniqueAchs = ACHS.filter((a,i,arr)=>arr.findIndex(b=>b.id===a.id)===i);

let activeFilter='all';

function renderGuide(){
    const search=document.getElementById('searchBox').value.toLowerCase();
    const content=document.getElementById('guide-content');
    content.innerHTML='';

    const ach=appData.achievements||{};
    let totalOpen=0, totalXP=0;
    Object.keys(ACH_XP).forEach(id=>{ if(ach[id]){totalOpen++;totalXP+=ACH_XP[id]||0;} });
    document.getElementById('ps-open').textContent=totalOpen;
    document.getElementById('ps-pct').textContent=Math.round(totalOpen/60*100)+'%';
    document.getElementById('ps-xp').textContent=totalXP;

    const filtered=uniqueAchs.filter(a=>{
        if(activeFilter!=='all' && a.cat!==activeFilter) return false;
        if(search && !a.name.toLowerCase().includes(search) && !a.how.toLowerCase().includes(search) && !a.id.includes(search)) return false;
        return true;
    });

    if(!filtered.length){
        content.innerHTML='<div class="empty-state">🔍 Aramanla eşleşen başarım bulunamadı.</div>';
        return;
    }

    const catGroups={};
    filtered.forEach(a=>{
        if(!catGroups[a.cat]) catGroups[a.cat]=[];
        catGroups[a.cat].push(a);
    });

    CATS.forEach(cat=>{
        const items=catGroups[cat.id];
        if(!items||!items.length) return;

        const sec=document.createElement('div');
        sec.className='cat-section';
        let delay=0;
        sec.innerHTML=`<div class="cat-header"><h3 style="color:${cat.color}">${cat.name}</h3><span class="cat-count">${items.length}</span></div>`;
        content.appendChild(sec);

        const grid=document.createElement('div');
        grid.className='guide-grid';

        items.forEach(a=>{
            const isOpen=!!ach[a.id];
            const isSecret=['Gizli','Final'].includes(a.tip);
            const isFinal=a.tip==='Final';
            const xp=ACH_XP[a.id]||0;
            const tipBadge={'Normal':'b-normal','Başlangıç':'b-bas','Zor':'b-zor','Efsanevi':'b-efsa','Gizli':'b-gizli','Sistemsel':'b-sis','Final':'b-final'}[a.tip]||'b-normal';

            const card=document.createElement('div');
            card.className=`guide-card${isOpen?' unlocked':''}${isFinal?' final-card':''}${isSecret&&!isOpen?' secret-card':''}`;
            card.style.animationDelay=`${delay*0.04}s`;
            delay++;

            card.innerHTML=`
                <div class="gc-unlock-badge ${isOpen?'ub-open':'ub-lock'}">${isOpen?'✅ AÇIK':'🔒'}</div>
                <div class="gc-top">
                    <div class="gc-icon ${isOpen?'unlocked-icon':''}">${a.icon}</div>
                    <div class="gc-meta">
                        <div class="gc-name">${a.name}</div>
                        <div class="gc-badges">
                            <span class="badge ${tipBadge}">${a.tip}</span>
                            <span class="badge b-xp">+${xp} XP</span>
                        </div>
                    </div>
                </div>
                <div class="gc-divider"></div>
                <div class="gc-how-title">⚔️ NASIL KAZANILIR?</div>
                <div class="gc-how">${a.how}</div>
                ${a.dep?`<div class="gc-dep">🔗 Önce açılması gereken: <span>${a.dep}</span></div>`:''}
            `;
            grid.appendChild(card);
        });

        content.appendChild(grid);
    });
}

function buildCatFilter(){
    const cf=document.getElementById('catFilter');
    const allBtn=document.createElement('div');
    allBtn.className='cat-btn active';allBtn.textContent='TÜM';
    allBtn.onclick=()=>{activeFilter='all';document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));allBtn.classList.add('active');renderGuide();};
    cf.appendChild(allBtn);

    CATS.forEach(cat=>{
        const btn=document.createElement('div');
        btn.className='cat-btn';
        btn.textContent=cat.name;
        btn.onclick=()=>{activeFilter=cat.id;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGuide();};
        cf.appendChild(btn);
    });
}

function updateLGSMini(){
    const days=Math.floor((new Date('June 14, 2026 09:30:00').getTime()-Date.now())/86400000);
    document.getElementById('lgs-mini').textContent=days;
}

/* ── BAŞLANGIÇ ── */
applyTheme(); updateHeader(); buildCatFilter(); renderGuide(); updateLGSMini();

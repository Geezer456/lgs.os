<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGS.OS | Dinamik Saat</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff8800; /* LGS.OS Ana Turuncusu */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.5s ease;
        }

        /* Ana Taşıyıcı */
        .wrapper {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; width: 100%; position: relative; z-index: 2;
        }

        /* Saat Tasarımı */
        #clock {
            font-size: clamp(5rem, 18vw, 15rem);
            font-weight: 800; margin: 0;
            display: flex; align-items: baseline;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #seconds { font-size: 0.4em; margin-left: 15px; opacity: 0.6; }
        .hidden { display: none !important; }

        /* Butonlar */
        .controls { margin-top: 50px; display: flex; gap: 15px; z-index: 10; }
        
        button {
            padding: 12px 25px; background: transparent;
            border: 2px solid var(--text); color: var(--text);
            cursor: pointer; font-weight: bold; border-radius: 12px;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: var(--text); color: var(--bg); }

        /* --- TEMALAR --- */
        .theme-white { background-color: #ffffff !important; color: #000000 !important; }
        .theme-white button { border-color: #000; color: #000; }
        .theme-white button:hover { background: #000; color: #fff; }

        .theme-black { background-color: #000000 !important; color: #ffffff !important; }

        .theme-cyberpunk { background-color: #050505 !important; color: #0ff !important; }
        .theme-cyberpunk #clock { text-shadow: 4px 4px #f0f, -2px -2px #0ff; }
        .theme-cyberpunk button { border-color: #f0f; color: #f0f; }
        .theme-cyberpunk button:hover { background: #f0f; color: #000; }

        .theme-minecraft { background-color: #5d81bf !important; color: #fff !important; }
        .mc-world { display: none; position: absolute; bottom: 0; width: 100%; height: 100px; background: #4a752c; z-index: 1; }
        .theme-minecraft .mc-world { display: block; }

        /* Geri Dönüş */
        .nav-home {
            position: absolute; top: 20px; left: 20px;
            text-decoration: none; color: inherit; font-size: 14px;
            font-weight: bold; border: 1px solid; padding: 8px 15px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-home">← ANA SAYFAYA DÖN</a>

    <div class="wrapper" id="main-layer">
        <div id="clock">00:00<span id="seconds" class="hidden">:00</span></div>

        <div class="controls">
            <button onclick="toggleSec()">Saniye</button>
            <button onclick="setTheme('black')">Siyah</button>
            <button onclick="setTheme('white')">Beyaz</button>
            <button onclick="setTheme('cyberpunk')">Cyberpunk</button>
            <button onclick="setTheme('minecraft')">Minecraft</button>
        </div>
    </div>

    <div class="mc-world">
        <div style="width:40px; height:60px; background:#51a03e; position:absolute; left:10%; bottom:20px; border:3px solid #000;"></div>
        <div style="width:30px; height:80px; background:#6d4a2c; position:absolute; right:15%; bottom:20px;"></div>
    </div>

    <script>
        function update() {
            const now = new Intl.DateTimeFormat('tr-TR', {
                timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit', second: '2-digit'
            }).format(new Date());
            const [h, m, s] = now.split(':');
            document.getElementById('clock').childNodes[0].nodeValue = `${h}:${m}`;
            document.getElementById('seconds').innerText = `:${s}`;
        }

        function toggleSec() { document.getElementById('seconds').classList.toggle('hidden'); }

        function setTheme(t) {
            document.body.className = 'theme-' + t;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
